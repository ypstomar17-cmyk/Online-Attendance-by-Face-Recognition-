<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaceAttend — Smart Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<style>
  :root {
    --bg: #07080f;
    --surface: #0f1018;
    --card: #13141e;
    --border: #1e2030;
    --border2: #2a2d45;
    --accent: #4fffb0;
    --accent2: #7c6fff;
    --danger: #ff5f6d;
    --warn: #ffca3a;
    --text: #e2e4f0;
    --muted: #565870;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(76,255,176,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(124,111,255,0.05) 0%, transparent 60%);
    pointer-events: none;
  }
  .app { position: relative; z-index: 1; max-width: 1080px; margin: 0 auto; padding: 20px 16px 40px; }

  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark { width: 38px; height: 38px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: grid; place-items: center; font-size: 20px; flex-shrink: 0; }
  .logo-text { font-family: var(--mono); font-size: 17px; font-weight: 700; }
  .logo-text em { color: var(--accent); font-style: normal; }
  .nav { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 11px; padding: 4px; gap: 3px; }
  .nav-btn { font-family: var(--sans); font-size: 13px; font-weight: 500; padding: 7px 15px; border: none; border-radius: 8px; cursor: pointer; background: transparent; color: var(--muted); transition: all 0.2s; white-space: nowrap; }
  .nav-btn.active { background: var(--card); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.5); }
  .nav-btn:hover:not(.active) { color: var(--text); }

  #model-banner { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 12px; font-size: 13px; }
  #model-banner.done { border-color: #1a3d2b; background: #0a1f14; color: var(--accent); }
  #model-banner.error { border-color: #3d1a1a; color: var(--danger); }
  .prog-bar { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; margin-top: 8px; width: 260px; }
  .prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width 0.4s; }

  .panel { display: none; animation: up 0.25s ease; }
  .panel.active { display: block; }
  @keyframes up { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 22px; margin-bottom: 18px; }
  .card-label { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }

  .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 20px; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
  .stat-n { font-family: var(--mono); font-size: 30px; font-weight: 700; line-height: 1; }
  .stat-n.g { color: var(--accent); }
  .stat-n.b { color: var(--accent2); }
  .stat-n.y { color: var(--warn); }
  .stat-l { font-size: 12px; color: var(--muted); margin-top: 5px; }

  .cam-outer { position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: #000; aspect-ratio: 4/3; }
  .cam-outer video { width:100%; height:100%; object-fit:cover; display:block; }
  .cam-outer canvas.overlay { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  .cam-off { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:var(--muted); font-size:14px; background:#000; }
  .cam-off .ico { font-size:44px; }
  .scan-box { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:54%; aspect-ratio:3/4; border:2px solid var(--accent); border-radius:6px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.45); }
  .scan-line { position:absolute; left:5%; right:5%; height:2px; background:linear-gradient(90deg,transparent,var(--accent),transparent); animation:scan 2s ease-in-out infinite; top:20%; }
  @keyframes scan { 0%,100%{top:15%} 50%{top:78%} }

  .btn { font-family:var(--sans); font-weight:600; font-size:14px; padding:9px 18px; border:none; border-radius:8px; cursor:pointer; display:inline-flex; align-items:center; gap:7px; transition:all 0.18s; }
  .btn-p { background:var(--accent); color:#000; }
  .btn-p:hover { filter:brightness(1.1); transform:translateY(-1px); }
  .btn-s { background:var(--surface); color:var(--text); border:1px solid var(--border2); }
  .btn-s:hover { border-color:var(--accent2); color:var(--accent2); }
  .btn-d { background:#1f0d0d; color:var(--danger); border:1px solid #3d1515; }
  .btn-d:hover { background:#2a1010; }
  .btn:disabled { opacity:0.35; cursor:not-allowed; transform:none !important; filter:none !important; }
  .btn-row { display:flex; gap:9px; flex-wrap:wrap; margin-top:14px; }

  .fg { margin-bottom:13px; }
  label { display:block; font-size:12px; font-weight:500; color:var(--muted); margin-bottom:5px; }
  input[type=text], input[type=email] { width:100%; background:var(--surface); border:1px solid var(--border2); color:var(--text); padding:9px 13px; border-radius:8px; font-size:14px; font-family:var(--sans); outline:none; transition:border-color 0.2s; }
  input:focus { border-color:var(--accent2); }

  .rbox { background:var(--surface); border:1px solid var(--border2); border-radius:10px; padding:16px; margin-top:14px; min-height:70px; font-size:14px; }
  .rbox.ok { border-color:#1a4d35; background:#081c11; }
  .rbox.fail { border-color:#4d1a1a; background:#1a0808; }

  .badge { display:inline-flex; align-items:center; gap:5px; font-family:var(--mono); font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; }
  .badge.present { background:#0c2d1c; color:var(--accent); border:1px solid #1a5c38; }
  .dot { width:6px; height:6px; border-radius:50%; background:currentColor; animation:blink 1.2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

  .sg { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:12px; }
  .sc { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px; display:flex; flex-direction:column; align-items:center; gap:7px; text-align:center; }
  .av { width:68px; height:68px; border-radius:50%; overflow:hidden; border:2px solid var(--border2); flex-shrink:0; background:var(--card); display:flex; align-items:center; justify-content:center; font-size:26px; }
  .av img { width:100%; height:100%; object-fit:cover; }
  .sn { font-size:13px; font-weight:600; }
  .si { font-family:var(--mono); font-size:10px; color:var(--muted); }

  .tbl { width:100%; border-collapse:collapse; font-size:13px; }
  .tbl th { text-align:left; padding:8px 12px; font-family:var(--mono); font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border); }
  .tbl td { padding:10px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }
  .tbl tr:last-child td { border:none; }

  .row { display:flex; align-items:center; }
  .jb { justify-content:space-between; }
  .g8 { gap:8px; }
  .muted { color:var(--muted); font-size:13px; }
  .mt12 { margin-top:12px; }
  .empty { text-align:center; padding:44px 20px; color:var(--muted); }
  .empty .ico { font-size:38px; margin-bottom:10px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; align-items:start; }

  .spin { width:16px; height:16px; border:2px solid rgba(255,255,255,0.15); border-top-color:var(--accent); border-radius:50%; animation:spin360 0.65s linear infinite; flex-shrink:0; }
  @keyframes spin360 { to{transform:rotate(360deg)} }

  #toast { position:fixed; bottom:22px; right:22px; background:var(--card); border:1px solid var(--border2); border-radius:10px; padding:13px 18px; font-size:14px; font-weight:500; z-index:99; transform:translateY(70px); opacity:0; transition:all 0.28s; max-width:300px; }
  #toast.show { transform:translateY(0); opacity:1; }
  #toast.ok { border-color:#1a5c38; color:var(--accent); }
  #toast.err { border-color:#5c1a1a; color:var(--danger); }

  .conf-bar { height:6px; background:var(--border); border-radius:6px; overflow:hidden; margin-top:6px; }
  .conf-fill { height:100%; border-radius:6px; transition:width 0.5s; }

  @media(max-width:640px) {
    .grid2 { grid-template-columns:1fr; }
    .nav-btn { padding:7px 10px; font-size:12px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-mark">👁</div>
      <div class="logo-text">Face<em>Attend</em></div>
    </div>
    <div class="nav">
      <button class="nav-btn active" onclick="goTab('attendance',this)">📷 Attendance</button>
      <button class="nav-btn" onclick="goTab('register',this)">➕ Register</button>
      <button class="nav-btn" onclick="goTab('students',this)">👥 Students</button>
      <button class="nav-btn" onclick="goTab('logs',this)">📋 Logs</button>
    </div>
  </header>

  <div id="model-banner">
    <div class="spin" style="margin-top:2px"></div>
    <div style="flex:1">
      <div id="model-msg">Face recognition models load ho rahe hain... (pehli baar 10-15 sec lag sakte hain)</div>
      <div class="prog-bar"><div class="prog-fill" id="prog" style="width:5%"></div></div>
    </div>
  </div>

  <!-- ATTENDANCE -->
  <div id="tab-attendance" class="panel active">
    <div class="stats" id="stats"></div>
    <div class="grid2">
      <div class="card">
        <div class="card-label">Live Camera</div>
        <div class="cam-outer" id="cwA">
          <video id="vidA" autoplay playsinline muted></video>
          <canvas id="overlayA" class="overlay"></canvas>
          <div class="cam-off" id="coffA"><div class="ico">📷</div><div>Camera band hai</div></div>
          <div class="scan-box" id="scanbox" style="display:none"><div class="scan-line"></div></div>
        </div>
        <div class="fg mt12">
          <label>Session / Class</label>
          <input type="text" id="sessionName" value="Morning Session" placeholder="e.g. Math 101">
        </div>
        <div class="btn-row">
          <button class="btn btn-p" id="btnStartA" onclick="startCam('A')">▶ Camera On</button>
          <button class="btn btn-s" id="btnScanA" onclick="doRecognize()" disabled>🔍 Pehchano</button>
          <button class="btn btn-s" id="btnStopA" onclick="stopCam('A')" disabled>⏹ Stop</button>
        </div>
      </div>
      <div class="card">
        <div class="card-label">Result</div>
        <div id="resultArea"><div class="muted">Camera on karo aur "Pehchano" click karo.</div></div>
        <div style="margin-top:22px">
          <div class="card-label">Aaj ki Attendance</div>
          <div id="todayList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- REGISTER -->
  <div id="tab-register" class="panel">
    <div class="grid2">
      <div class="card">
        <div class="card-label">Student ki Photo</div>
        <div class="cam-outer" id="cwR">
          <video id="vidR" autoplay playsinline muted></video>
          <canvas id="snapCanvas" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none"></canvas>
          <div class="cam-off" id="coffR"><div class="ico">📷</div><div>Camera band hai</div></div>
        </div>
        <div class="btn-row">
          <button class="btn btn-p" id="btnStartR" onclick="startCam('R')">▶ Camera On</button>
          <button class="btn btn-s" id="btnSnapR" onclick="snapPhoto()" disabled>📸 Photo Lo</button>
          <button class="btn btn-s" id="btnRetakeR" onclick="retake()" style="display:none" disabled>🔄 Dobara</button>
          <button class="btn btn-s" id="btnStopR" onclick="stopCam('R')" disabled>⏹ Stop</button>
        </div>
        <div id="photoStatus" class="muted mt12" style="font-size:12px"></div>
      </div>
      <div class="card">
        <div class="card-label">Student Details</div>
        <div class="fg"><label>Poora Naam *</label><input type="text" id="rName" placeholder="e.g. Ali Hassan"></div>
        <div class="fg"><label>Student ID *</label><input type="text" id="rId" placeholder="e.g. STU-001"></div>
        <div class="fg"><label>Class / Section</label><input type="text" id="rClass" placeholder="e.g. Grade 10-A"></div>
        <div class="fg"><label>Email (optional)</label><input type="email" id="rEmail" placeholder="ali@school.com"></div>
        <div id="photoThumb" style="display:none;margin-bottom:14px">
          <label>Captured Photo</label>
          <img id="thumbImg" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);margin-top:6px;display:block">
        </div>
        <button class="btn btn-p" onclick="registerStudent()" style="width:100%">✅ Register Karo</button>
        <div id="regMsg" style="margin-top:10px;font-size:13px"></div>
      </div>
    </div>
  </div>

  <!-- STUDENTS -->
  <div id="tab-students" class="panel">
    <div class="card">
      <div class="row jb g8" style="margin-bottom:16px;flex-wrap:wrap">
        <div class="card-label" style="margin:0">Registered Students</div>
        <button class="btn btn-d" onclick="clearAllStudents()">🗑 Sab Hatao</button>
      </div>
      <div id="studentList"></div>
    </div>
  </div>

  <!-- LOGS -->
  <div id="tab-logs" class="panel">
    <div class="card">
      <div class="row jb g8" style="margin-bottom:16px;flex-wrap:wrap">
        <div class="card-label" style="margin:0">Attendance Log</div>
        <div class="row g8">
          <button class="btn btn-s" onclick="exportCSV()">⬇ CSV Export</button>
          <button class="btn btn-d" onclick="clearLogs()">🗑 Logs Hatao</button>
        </div>
      </div>
      <div id="logArea"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Storage ──────────────────────────────────────────────────────────────────
const DB = {
  students: () => { try { return JSON.parse(localStorage.getItem('fa2_students')||'[]'); } catch{ return []; } },
  saveStudents: d => localStorage.setItem('fa2_students', JSON.stringify(d)),
  logs: () => { try { return JSON.parse(localStorage.getItem('fa2_logs')||'[]'); } catch{ return []; } },
  saveLogs: d => localStorage.setItem('fa2_logs', JSON.stringify(d)),
};
const FD = {
  get: () => { try { const r = localStorage.getItem('fa2_descriptors'); return r ? JSON.parse(r) : {}; } catch{ return {}; } },
  save: d => localStorage.setItem('fa2_descriptors', JSON.stringify(d)),
};

// ── Toast ────────────────────────────────────────────────────────────────────
let toastT;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(toastT); toastT = setTimeout(() => el.className='', 3200);
}

// ── Tabs ─────────────────────────────────────────────────────────────────────
function goTab(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if (name==='students') renderStudents();
  if (name==='logs') renderLogs();
  if (name==='attendance') { renderStats(); renderTodayList(); }
}

// ── Model Loading ────────────────────────────────────────────────────────────
let modelsReady = false;
const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.13/model/';

async function loadModels() {
  const prog = document.getElementById('prog');
  const msg = document.getElementById('model-msg');
  const banner = document.getElementById('model-banner');
  try {
    msg.textContent = 'TinyFaceDetector load ho raha hai...';
    prog.style.width = '20%';
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    msg.textContent = 'FaceLandmark68 load ho raha hai...';
    prog.style.width = '55%';
    await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
    msg.textContent = 'FaceRecognition model load ho raha hai...';
    prog.style.width = '85%';
    await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
    prog.style.width = '100%';
    modelsReady = true;
    banner.className = 'done';
    banner.innerHTML = '✅ Face recognition ready hai! Ab camera on kar ke attendance le sakte ho.';
    renderStats();
  } catch(e) {
    banner.className = 'error';
    banner.innerHTML = '⚠️ Models load nahi hue: ' + e.message + '<br><small>Internet check karo ya page reload karo.</small>';
  }
}

// ── Camera ───────────────────────────────────────────────────────────────────
const streams = {};
async function startCam(id) {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video:{facingMode:'user',width:640,height:480}, audio:false });
    streams[id] = stream;
    const vid = document.getElementById('vid'+id);
    vid.srcObject = stream; vid.style.display='block';
    document.getElementById('coff'+id).style.display='none';
    if (id==='A') {
      document.getElementById('btnScanA').disabled = false;
      document.getElementById('btnStopA').disabled = false;
      document.getElementById('btnStartA').disabled = true;
      document.getElementById('scanbox').style.display='block';
    } else {
      document.getElementById('btnSnapR').disabled = false;
      document.getElementById('btnStopR').disabled = false;
      document.getElementById('btnStartR').disabled = true;
    }
  } catch(e) {
    toast('Camera error: ' + e.message + ' — HTTPS ya localhost pe chalao.', 'err');
  }
}
function stopCam(id) {
  if (streams[id]) { streams[id].getTracks().forEach(t=>t.stop()); delete streams[id]; }
  const vid = document.getElementById('vid'+id);
  if (vid) { vid.srcObject=null; vid.style.display='none'; }
  document.getElementById('coff'+id).style.display='flex';
  if (id==='A') {
    document.getElementById('btnScanA').disabled=true;
    document.getElementById('btnStopA').disabled=true;
    document.getElementById('btnStartA').disabled=false;
    document.getElementById('scanbox').style.display='none';
    const c=document.getElementById('overlayA'); c.getContext('2d').clearRect(0,0,c.width,c.height);
  } else {
    document.getElementById('btnSnapR').disabled=true;
    document.getElementById('btnStopR').disabled=true;
    document.getElementById('btnStartR').disabled=false;
  }
}

// ── Snap ─────────────────────────────────────────────────────────────────────
let capturedPhoto = null;
function snapPhoto() {
  const vid = document.getElementById('vidR');
  const canvas = document.getElementById('snapCanvas');
  canvas.width = vid.videoWidth||640; canvas.height = vid.videoHeight||480;
  canvas.getContext('2d').drawImage(vid, 0, 0);
  capturedPhoto = canvas.toDataURL('image/jpeg', 0.9);
  canvas.style.display='block'; vid.style.display='none';
  document.getElementById('btnSnapR').style.display='none';
  document.getElementById('btnRetakeR').style.display='inline-flex';
  document.getElementById('thumbImg').src = capturedPhoto;
  document.getElementById('photoThumb').style.display='block';
  document.getElementById('photoStatus').textContent='✅ Photo capture ho gayi!';
  toast('Photo le li!');
}
function retake() {
  capturedPhoto = null;
  document.getElementById('snapCanvas').style.display='none';
  document.getElementById('vidR').style.display='block';
  document.getElementById('btnSnapR').style.display='inline-flex';
  document.getElementById('btnRetakeR').style.display='none';
  document.getElementById('photoThumb').style.display='none';
  document.getElementById('photoStatus').textContent='';
}

// ── Register ──────────────────────────────────────────────────────────────────
async function registerStudent() {
  const name = document.getElementById('rName').value.trim();
  const id = document.getElementById('rId').value.trim();
  const cls = document.getElementById('rClass').value.trim();
  const email = document.getElementById('rEmail').value.trim();
  const msgEl = document.getElementById('regMsg');
  if (!name||!id) { msgEl.style.color='var(--danger)'; msgEl.textContent='⚠️ Naam aur ID zaroori hai.'; return; }
  if (!capturedPhoto) { msgEl.style.color='var(--danger)'; msgEl.textContent='⚠️ Pehle photo lo.'; return; }
  if (!modelsReady) { msgEl.style.color='var(--danger)'; msgEl.textContent='⚠️ Models abhi load ho rahe hain, wait karo.'; return; }
  const students = DB.students();
  if (students.find(s=>s.id===id)) { msgEl.style.color='var(--danger)'; msgEl.textContent='⚠️ Ye ID pehle se register hai.'; return; }
  msgEl.style.color='var(--accent)'; msgEl.textContent='⏳ Face descriptor bana raha hoon...';
  try {
    const img = await faceapi.fetchImage(capturedPhoto);
    const det = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions())
      .withFaceLandmarks().withFaceDescriptor();
    if (!det) { msgEl.style.color='var(--danger)'; msgEl.textContent='⚠️ Photo mein chehra nahi mila. Clear, seedhi photo lo.'; return; }
    const fds = FD.get();
    fds[id] = Array.from(det.descriptor);
    FD.save(fds);
    students.push({ name, id, class:cls, email, photo:capturedPhoto, regAt: new Date().toISOString() });
    DB.saveStudents(students);
    msgEl.style.color='var(--accent)'; msgEl.textContent='✅ Register ho gaya!';
    toast('✅ ' + name + ' register ho gaya!');
    ['rName','rId','rClass','rEmail'].forEach(f=>document.getElementById(f).value='');
    retake();
    setTimeout(()=>msgEl.textContent='', 3000);
  } catch(e) {
    msgEl.style.color='var(--danger)'; msgEl.textContent='Error: '+e.message;
  }
}

// ── Recognize ─────────────────────────────────────────────────────────────────
let recogBusy = false;
async function doRecognize() {
  if (recogBusy) return;
  if (!modelsReady) { toast('Models abhi ready nahi. Thoda wait karo.','err'); return; }
  const students = DB.students();
  const fds = FD.get();
  if (!students.length) { toast('Koi student register nahi.','err'); return; }
  const labeled = students.filter(s=>fds[s.id]).map(s =>
    new faceapi.LabeledFaceDescriptors(s.id, [new Float32Array(fds[s.id])])
  );
  if (!labeled.length) { toast('Kisi student ka face descriptor nahi. Dobara register karo.','err'); return; }

  recogBusy = true;
  const btn = document.getElementById('btnScanA');
  btn.disabled = true; btn.innerHTML = '<div class="spin"></div> Dekh raha hoon...';
  const resultArea = document.getElementById('resultArea');
  resultArea.innerHTML = '<div class="rbox"><div class="row g8"><div class="spin"></div> <span>Chehra dhundh raha hoon...</span></div></div>';

  try {
    const vid = document.getElementById('vidA');
    const canvas = document.getElementById('overlayA');
    canvas.width = vid.videoWidth||640; canvas.height = vid.videoHeight||480;

    const det = await faceapi
      .detectSingleFace(vid, new faceapi.TinyFaceDetectorOptions({ inputSize:320, scoreThreshold:0.4 }))
      .withFaceLandmarks().withFaceDescriptor();

    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if (!det) {
      resultArea.innerHTML = `<div class="rbox fail">
        <div style="font-size:16px;font-weight:700;color:var(--danger)">😕 Chehra nahi mila</div>
        <div class="muted" style="margin-top:6px;font-size:13px">Camera ke saamne seedha aa jao, acha light hona chahiye.</div>
      </div>`;
      recogBusy=false; btn.disabled=false; btn.innerHTML='🔍 Pehchano'; return;
    }

    const box = det.detection.box;
    const matcher = new faceapi.FaceMatcher(labeled, 0.55);
    const match = matcher.findBestMatch(det.descriptor);
    const confidence = Math.round((1 - match.distance) * 100);

    if (match.label === 'unknown') {
      ctx.strokeStyle='#ff5f6d'; ctx.lineWidth=2;
      ctx.strokeRect(box.x, box.y, box.width, box.height);
      resultArea.innerHTML = `<div class="rbox fail">
        <div style="font-size:13px;color:var(--muted);margin-bottom:6px">RESULT</div>
        <div style="font-size:18px;font-weight:700;color:var(--danger)">❌ Pehchana nahi gaya</div>
        <div class="muted" style="margin-top:8px;font-size:13px">Kisi registered student se match nahi kiya (best: ${confidence}%).</div>
      </div>`;
    } else {
      const student = DB.students().find(s=>s.id===match.label);
      const sName = student ? student.name : match.label;
      const confColor = confidence>=80 ? 'var(--accent)' : confidence>=65 ? 'var(--warn)' : 'var(--danger)';
      ctx.strokeStyle='#4fffb0'; ctx.lineWidth=2;
      ctx.strokeRect(box.x, box.y, box.width, box.height);
      ctx.font='bold 13px DM Sans';
      const tw = ctx.measureText(sName).width + 14;
      ctx.fillStyle='#4fffb0';
      ctx.fillRect(box.x, box.y - 24, tw, 22);
      ctx.fillStyle='#000';
      ctx.fillText(sName, box.x + 7, box.y - 7);

      resultArea.innerHTML = `<div class="rbox ok">
        <div style="font-size:12px;color:var(--muted);margin-bottom:8px;font-family:var(--mono)">STUDENT PEHCHANA GAYA</div>
        <div style="font-size:24px;font-weight:700;color:var(--accent)">${sName}</div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px">ID: ${match.label}${student?.class ? ' · ' + student.class : ''}</div>
        <div style="margin-top:12px">
          <div style="font-size:12px;color:var(--muted)">Match Confidence</div>
          <div style="font-size:20px;font-weight:700;color:${confColor};font-family:var(--mono)">${confidence}%</div>
          <div class="conf-bar"><div class="conf-fill" style="width:${Math.min(confidence,100)}%;background:${confColor}"></div></div>
        </div>
        <div style="margin-top:12px"><span class="badge present"><span class="dot"></span>PRESENT MARK HO GAYA</span></div>
      </div>`;
      markAttendance(match.label, sName);
    }
  } catch(e) {
    resultArea.innerHTML = `<div class="rbox fail">Error: ${e.message}</div>`;
  }
  recogBusy=false; btn.disabled=false; btn.innerHTML='🔍 Pehchano';
}

// ── Mark Attendance ───────────────────────────────────────────────────────────
function markAttendance(studentId, studentName) {
  const logs = DB.logs();
  const today = new Date().toDateString();
  const session = document.getElementById('sessionName')?.value || 'Session';
  if (logs.find(l=>l.studentId===studentId && new Date(l.timestamp).toDateString()===today && l.session===session)) {
    toast(studentName + ' is session mein pehle se mark hai.','err'); return;
  }
  logs.unshift({ studentId, studentName, session, timestamp: new Date().toISOString(), status:'present' });
  DB.saveLogs(logs);
  toast('✅ ' + studentName + ' present mark ho gaya!');
  renderTodayList(); renderStats();
}

function renderTodayList() {
  const el = document.getElementById('todayList'); if(!el) return;
  const today = new Date().toDateString();
  const list = DB.logs().filter(l=>new Date(l.timestamp).toDateString()===today);
  if (!list.length) { el.innerHTML='<div class="muted" style="font-size:13px">Aaj abhi koi mark nahi hua.</div>'; return; }
  el.innerHTML = list.map(l=>`
    <div class="row jb" style="padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
      <div>
        <div style="font-weight:600">${l.studentName}</div>
        <div style="color:var(--muted);font-size:11px;font-family:var(--mono)">${l.studentId} · ${l.session}</div>
      </div>
      <div style="text-align:right">
        <span class="badge present"><span class="dot"></span>Present</span>
        <div style="font-size:10px;color:var(--muted);margin-top:3px">${new Date(l.timestamp).toLocaleTimeString()}</div>
      </div>
    </div>`).join('');
}

function renderStats() {
  const el = document.getElementById('stats'); if(!el) return;
  const students = DB.students(); const logs = DB.logs();
  const today = new Date().toDateString();
  const todayP = [...new Set(logs.filter(l=>new Date(l.timestamp).toDateString()===today).map(l=>l.studentId))].length;
  el.innerHTML = `
    <div class="stat"><div class="stat-n g">${todayP}</div><div class="stat-l">Aaj Present</div></div>
    <div class="stat"><div class="stat-n b">${students.length}</div><div class="stat-l">Registered</div></div>
    <div class="stat"><div class="stat-n y">${logs.length}</div><div class="stat-l">Total Records</div></div>`;
}

function renderStudents() {
  const students = DB.students(); const fds = FD.get();
  const el = document.getElementById('studentList');
  if (!students.length) { el.innerHTML='<div class="empty"><div class="ico">👥</div><div>Koi student register nahi.</div></div>'; return; }
  el.innerHTML=`<div class="sg">${students.map(s=>`
    <div class="sc">
      <div class="av"><img src="${s.photo}" alt="${s.name}" onerror="this.parentNode.textContent='👤'"></div>
      <div class="sn">${s.name}</div>
      <div class="si">${s.id}</div>
      <div style="font-size:11px;color:var(--muted)">${s.class||'—'}</div>
      <div style="font-size:11px;margin-top:2px">${fds[s.id] ? '🟢 Face Ready' : '🔴 No Face'}</div>
      <button style="font-size:11px;color:var(--danger);background:none;border:none;cursor:pointer;margin-top:4px" onclick="deleteStudent('${s.id}')">🗑 Remove</button>
    </div>`).join('')}</div>`;
}
function deleteStudent(id) {
  if(!confirm('Is student ko hatao?')) return;
  DB.saveStudents(DB.students().filter(s=>s.id!==id));
  const fds=FD.get(); delete fds[id]; FD.save(fds);
  renderStudents(); toast('Student hata diya.');
}
function clearAllStudents() {
  if(!confirm('Saare students hatao?')) return;
  DB.saveStudents([]); FD.save({});
  renderStudents(); toast('Sab students hata diye.','err');
}

function renderLogs() {
  const logs = DB.logs(); const el = document.getElementById('logArea');
  if (!logs.length) { el.innerHTML='<div class="empty"><div class="ico">📋</div><div>Koi log nahi abhi tak.</div></div>'; return; }
  el.innerHTML=`<div style="overflow-x:auto"><table class="tbl">
    <thead><tr><th>#</th><th>Naam</th><th>ID</th><th>Session</th><th>Status</th><th>Waqt</th></tr></thead>
    <tbody>${logs.map((l,i)=>`<tr>
      <td style="color:var(--muted);font-family:var(--mono)">${logs.length-i}</td>
      <td style="font-weight:600">${l.studentName}</td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--muted)">${l.studentId}</td>
      <td>${l.session}</td>
      <td><span class="badge present"><span class="dot"></span>Present</span></td>
      <td style="font-size:12px;color:var(--muted)">${new Date(l.timestamp).toLocaleString()}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}
function clearLogs() { if(!confirm('Saare logs hatao?')) return; DB.saveLogs([]); renderLogs(); renderStats(); renderTodayList(); toast('Logs hata diye.','err'); }
function exportCSV() {
  const logs=DB.logs(); if(!logs.length){toast('Koi log nahi.','err');return;}
  const csv='Name,StudentID,Session,Status,Timestamp\n'+logs.map(l=>`"${l.studentName}","${l.studentId}","${l.session}","${l.status}","${new Date(l.timestamp).toLocaleString()}"`).join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='attendance_'+new Date().toISOString().split('T')[0]+'.csv'; a.click(); toast('CSV download ho raha hai!');
}

renderStats(); renderTodayList();
function tryLoad() { if (typeof faceapi !== 'undefined') loadModels(); else setTimeout(tryLoad, 300); }
tryLoad();
</script>
